    function downloadWord(filename, htmlContent) {
      const header = `<html xmlns:o='urn:schemas-microsoft-com:office:office'
        xmlns:w='urn:schemas-microsoft-com:office:word'
        xmlns='http://www.w3.org/TR/REC-html40'>
        <head><meta charset='utf-8'><title></title>
        <style>
          body { font-family: Georgia, serif; font-size: 12pt; margin: 2cm; line-height: 1.6; }
          h1 { font-size: 18pt; color: #1A3C5E; border-bottom: 2pt solid #C8973A; padding-bottom: 6pt; }
          h2 { font-size: 14pt; color: #1A3C5E; margin-top: 18pt; }
          h3 { font-size: 12pt; color: #C8973A; margin-top: 12pt; }
          p { margin: 6pt 0; text-align: justify; }
          .field { background: #FFF8DC; border: 1pt dashed #C8973A; padding: 4pt 8pt; }
          table { width: 100%; border-collapse: collapse; margin: 12pt 0; }
          td, th { border: 1pt solid #ccc; padding: 6pt 8pt; }
          th { background: #1A3C5E; color: white; }
          .nota { font-style: italic; color: #888; font-size: 10pt; }
        </style></head><body>`;
      const footer = `</body></html>`;
      const blob = new Blob([header + htmlContent + footer], { type: "application/msword" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url; a.download = filename; a.click();
      URL.revokeObjectURL(url);
    }

                  {parqueUrbano.gestao.map((g,i) => (
                    <div key={i} style={{ marginBottom:10, border:"1px solid #C8D8B0", borderLeft:"4px solid #3A7A1A", background:"#F0F5EA" }}>
                      <div style={{ background:"#3A7A1A", padding:"7px 12px" }}>
                        <span style={{ color:"#fff", fontWeight:"bold", fontSize:12 }}>{g.n}. {g.titulo}</span>
                      </div>
                      <div style={{ padding:"10px 12px" }}>
                        {g.docs.map((d,di) => (
                          <div key={di} style={{ display:"flex", gap:7, fontSize:12, color:"#2C2C2C", marginBottom:5 }}>
                            <span style={{ color:"#3A7A1A", flexShrink:0 }}>▸</span>
                            <span style={{ lineHeight:1.5 }}>{d}</span>
                          </div>
                        ))}
                      </div>
                    </div>
                  ))}
                </div>
                <div style={{ marginTop:18 }}>
                  <SectionTitle>Modelos de Referência Europeus</SectionTitle>
                  <table style={{ width:"100%", borderCollapse:"collapse", fontSize:12 }}>
                    <thead><tr>
                      <th style={{ background:"#1A3C5E", color:"#F5F0E8", padding:"8px 12px", textAlign:"left" }}>Modelo</th>
                      <th style={{ background:"#1A3C5E", color:"#F5F0E8", padding:"8px 12px", textAlign:"left" }}>Relevância</th>
                    </tr></thead>
                    <tbody>{parqueUrbano.modelos.map(([m,r],i) => (
                      <tr key={i} style={{ background: i%2===0?"#EDE8DE":"#F5F0E8" }}>
                        <td style={{ padding:"8px 12px", fontWeight:"bold", color:"#1A3C5E", borderBottom:"1px solid #D4CDBF" }}>{m}</td>
                        <td style={{ padding:"8px 12px", color:"#2C2C2C", borderBottom:"1px solid #D4CDBF" }}>{r}</td>
                      </tr>
                    ))}</tbody>
                  </table>
                </div>
              </div>
            )}

            {/* PRESIDENTE EM PÚBLICO */}
            {mod.presidentePublico && (
              <div>
                <p style={{ color:"#555", fontSize:13, lineHeight:1.7, marginBottom:18 }}>Frases preparadas, perguntas difíceis com respostas, e mnémónicas para organizar o raciocínio em tempo real.</p>
                <SectionTitle>Frases Preparadas por Contexto</SectionTitle>
                {presidentePublico.frases.map((f,i) => (
                  <div key={i} style={{ display:"flex", background: i%2===0?"#EDE8DE":"#F5F0E8", borderLeft:"3px solid #C8973A", marginBottom:5 }}>
                    <div style={{ padding:"8px 12px", fontSize:11, fontWeight:"bold", color:"#1A3C5E", minWidth:180, flexShrink:0 }}>{f.contexto}</div>
                    <div style={{ padding:"8px 12px", fontSize:12, color:"#2C2C2C", fontStyle:"italic", lineHeight:1.6, flex:1 }}>{f.frase}</div>
                  </div>
                ))}
                <div style={{ marginTop:18 }}>
                  <SectionTitle>Perguntas Difíceis — Com Respostas Preparadas</SectionTitle>
                  {presidentePublico.perguntas.map((pq,i) => (
                    <div key={i} style={{ marginBottom:9, border:"1px solid #C8D8B0", overflow:"hidden" }}>
                      <div style={{ background:"#1A3C5E", padding:"8px 14px" }}>
                        <span style={{ color:"#F5F0E8", fontSize:12, fontWeight:"bold" }}>❓ {pq.p}</span>
                      </div>
                      <div style={{ padding:"10px 14px", background:"#F0F5EA", display:"flex", gap:8 }}>
                        <span style={{ color:"#3A7A1A", flexShrink:0 }}>💬</span>
                        <span style={{ fontSize:12, color:"#2C2C2C", lineHeight:1.6 }}>{pq.r}</span>
                      </div>
                    </div>
                  ))}
                </div>
                <div style={{ marginTop:18 }}>
                  <SectionTitle>Mnémónicas — Para Organizar o Raciocínio em Público</SectionTitle>
                  <p style={{ fontSize:12, color:"#666", marginBottom:10, fontStyle:"italic" }}>Quando perder o fio — respira e lembra uma destas siglas.</p>
                  {presidentePublico.mnemonicas.map((mn,i) => (
                    <div key={i} style={{ display:"grid", gridTemplateColumns:"100px 1fr 1fr", background: i%2===0?"#EDE8DE":"#F5F0E8", borderLeft:"4px solid #C8973A", marginBottom:5 }}>
                      <div style={{ padding:"10px 12px", fontWeight:"bold", fontSize:15, color:"#C8973A", display:"flex", alignItems:"center", justifyContent:"center" }}>{mn.sigla}</div>
                      <div style={{ padding:"10px 12px", fontSize:12, color:"#1A3C5E", fontWeight:"bold", display:"flex", alignItems:"center", borderLeft:"1px solid #D4CDBF" }}>{mn.expansao}</div>
                      <div style={{ padding:"10px 12px", fontSize:11, color:"#666", fontStyle:"italic", display:"flex", alignItems:"center", borderLeft:"1px solid #D4CDBF" }}>{mn.uso}</div>
                    </div>
                  ))}
                </div>
              </div>
            )}

            {/* SECTIONS NORMAIS */}
            {!mod.retorica && !mod.portavozFestival && !mod.parqueUrbano && !mod.presidentePublico && mod.sections && mod.sections.map((sec,si) => (
              <div key={si} style={{ marginBottom:22 }}>
                <SectionTitle>{sec.heading}</SectionTitle>

                {sec.content && <p style={{ color:"#2C2C2C", lineHeight:1.8, fontSize:13, margin:0, whiteSpace:"pre-line" }}>{sec.content}</p>}

                {sec.downloads && (
                  <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:8 }}>
                    {wordDocs.map((d,di) => (
                      <button key={di} onClick={() => downloadWord(d.filename, d.html)}
                        style={{ background:"#EDE8DE", border:"1px solid #C8973A", cursor:"pointer", padding:"9px 12px", display:"flex", alignItems:"center", gap:8, fontFamily:"Georgia, serif", textAlign:"left" }}>
                        <span style={{ fontSize:18 }}>{d.icon}</span>
                        <div>
                          <div style={{ fontSize:12, fontWeight:"bold", color:"#1A3C5E" }}>{d.label}</div>
                          <div style={{ fontSize:10, color:"#888" }}>Descarregar modelo Word</div>
                        </div>
                        <span style={{ marginLeft:"auto", color:"#C8973A" }}>⬇</span>
                      </button>
                    ))}
                  </div>
                )}

                {sec.list && (
                  <div style={{ display:"flex", flexDirection:"column", gap:5 }}>
                    {sec.list.map(([k,v],li) => (
                      <div key={li} style={{ display:"flex", background:"#EDE8DE", borderLeft:"3px solid #C8973A" }}>
                        <div style={{ padding:"7px 11px", fontWeight:"bold", fontSize:12, color:"#1A3C5E", minWidth:160, flexShrink:0 }}>{k}</div>
                        <div style={{ padding:"7px 11px", fontSize:12, color:"#333", flex:1, lineHeight:1.6 }}>{v}</div>
                      </div>
                    ))}
                  </div>
                )}

                {sec.steps && (
                  <ol style={{ margin:0, paddingLeft:20, display:"flex", flexDirection:"column", gap:6 }}>
                    {sec.steps.map((s,i) => <li key={i} style={{ fontSize:12, color:"#2C2C2C", lineHeight:1.6 }}>{s}</li>)}
                  </ol>
                )}

                {sec.table && (
                  <div style={{ overflowX:"auto" }}>
                    <table style={{ width:"100%", borderCollapse:"collapse", fontSize:12 }}>
                      <thead><tr>{sec.table.cols.map((c,ci) => (
                        <th key={ci} style={{ background:"#1A3C5E", color:"#F5F0E8", padding:"8px 11px", textAlign:"left" }}>{c}</th>
                      ))}</tr></thead>
                      <tbody>{sec.table.rows.map((row,ri) => (
                        <tr key={ri} style={{ background: ri%2===0?"#EDE8DE":"#F5F0E8" }}>
                          {row.map((cell,ci) => (
                            <td key={ci} style={{ padding:"7px 11px", color:"#2C2C2C", borderBottom:"1px solid #D4CDBF", fontWeight: ci===0?"bold":"normal" }}>{cell}</td>
                          ))}
                        </tr>
                      ))}</tbody>
                    </table>
                  </div>
                )}

                {sec.burocracia && sec.burocracia.map((b,bi) => (
                  <div key={bi} style={{ marginBottom:10, border:"1px solid #C8D8B0", borderLeft:"4px solid #3A7A1A", background:"#F0F5EA" }}>
                    <div style={{ background:"#3A7A1A", padding:"7px 12px", display:"flex", justifyContent:"space-between", alignItems:"center" }}>
                      <div style={{ color:"#fff", fontWeight:"bold", fontSize:12 }}>{b.passo} — {b.titulo}</div>
                      {b.prazo && <div style={{ color:"#C8F0A0", fontSize:10 }}>⏱ {b.prazo}</div>}
                    </div>
                    <div style={{ padding:"10px 12px" }}>
                      {b.entidade && <div style={{ fontSize:11, color:"#3A7A1A", fontWeight:"bold", marginBottom:6 }}>📍 {b.entidade}{b.custo ? ` · 💶 ${b.custo}` : ""}</div>}
                      <div style={{ display:"flex", flexDirection:"column", gap:4 }}>
                        {b.docs.map((d,di) => (
                          <div key={di} style={{ display:"flex", gap:7, fontSize:12, color:"#2C2C2C" }}>
                            <span style={{ color:"#3A7A1A", flexShrink:0 }}>▸</span>
                            <span style={{ lineHeight:1.5 }}>{d}</span>
                          </div>
                        ))}
                      </div>
                    </div>
                  </div>
                ))}

                {sec.agenda && (
                  <div style={{ display:"flex", flexDirection:"column", gap:5 }}>
                    {sec.agenda.map((ev,i) => (
                      <div key={i} style={{ display:"grid", gridTemplateColumns:"100px 1fr 140px",
                        background: i===0?"#FFFBEE":"#EDE8DE",
                        borderLeft:`4px solid ${mesColors[ev.mes]||"#C8973A"}`,
                        outline: i===0?"2px solid #C8973A":"none" }}>
                        <div style={{ padding:"8px 10px", background:mesColors[ev.mes]||"#C8973A", color:"#F5F0E8", fontSize:11, fontWeight:"bold", display:"flex", alignItems:"center" }}>{ev.mes}</div>
                        <div style={{ padding:"8px 11px" }}>
                          <div style={{ fontSize:12, fontWeight:"bold", color: i===0?"#7A5800":"#1A3C5E" }}>{ev.tipo}</div>
                          <div style={{ fontSize:11, color:"#666", marginTop:2 }}>{ev.nota}</div>
                        </div>
                        <div style={{ padding:"8px 10px", fontSize:10, color:"#888", display:"flex", alignItems:"center", fontStyle:"italic" }}>{ev.espaco}</div>
                      </div>
                    ))}
                  </div>
                )}

                {sec.festival && (
                  <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10 }}>
                    {sec.festival.map((f,fi) => (
                      <div key={fi} style={{ border:`2px solid ${f.cor}`, overflow:"hidden" }}>
                        <div style={{ background:f.cor, padding:"8px 12px", color:"#fff", fontWeight:"bold", fontSize:12 }}>{f.icon} {f.espaco}</div>
                        <div style={{ padding:"10px 12px", background:"#FAFAF5" }}>
                          {f.eventos.map((e,ei) => (
                            <div key={ei} style={{ display:"flex", gap:6, marginBottom:5, fontSize:12, color:"#2C2C2C" }}>
                              <span style={{ color:f.cor, flexShrink:0 }}>◆</span><span>{e}</span>
                            </div>
                          ))}
                        </div>
                      </div>
                    ))}
                  </div>
                )}

                {sec.roadmap && (
                  <div style={{ display:"flex", flexDirection:"column", gap:4 }}>
                    {sec.roadmap.map((item,i) => {
                      const isFest = item.prazo==="Set. sem.2";
                      return (
                        <div key={i} style={{ display:"grid", gridTemplateColumns:"90px 1fr 150px",
                          background: isFest?"#FFFBEE": i%2===0?"#EDE8DE":"#F5F0E8",
                          borderLeft: isFest?"4px solid #C8973A":"4px solid #1A3C5E",
                          outline: isFest?"2px solid #C8973A":"none" }}>
                          <div style={{ padding:"7px 10px", fontWeight:"bold", fontSize:11, color: isFest?"#7A5800":"#C8973A" }}>{item.prazo}</div>
                          <div style={{ padding:"7px 11px", fontSize:12, color:"#2C2C2C" }}>{item.tarefa}</div>
                          <div style={{ padding:"7px 10px", fontSize:10, color:"#888", fontStyle:"italic" }}>{item.resp}</div>
                        </div>
                      );
                    })}
                  </div>
                )}
              </div>
            ))}
          </div>

          <div style={{ background:"#1A3C5E", borderTop:"2px solid #C8973A", padding:"9px 24px", display:"flex", justifyContent:"space-between", alignItems:"center" }}>
            <div style={{ fontSize:10, color:"#aac4d8", letterSpacing:1 }}>Documento de trabalho interno · Março 2026</div>
            <div style={{ display:"flex", gap:8 }}>
              {active>0 && <button onClick={()=>setActive(active-1)} style={{ background:"none", border:"1px solid #C8973A", color:"#C8973A", padding:"4px 11px", fontSize:11, cursor:"pointer", fontFamily:"Georgia, serif" }}>← Anterior</button>}
              {active<modules.length-1 && <button onClick={()=>setActive(active+1)} style={{ background:"#C8973A", border:"none", color:"#1A3C5E", padding:"4px 11px", fontSize:11, cursor:"pointer", fontFamily:"Georgia, serif", fontWeight:"bold" }}>Seguinte →</button>}
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
