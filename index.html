<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Projeto Cultural · Paços de Ferreira</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>



  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Georgia, serif; background: #F5F0E8; }
    ::-webkit-scrollbar { height: 4px; width: 4px; }
    ::-webkit-scrollbar-track { background: #22344A; }
    ::-webkit-scrollbar-thumb { background: #C8973A; }

    /* ── MODAL SÓCIOS ── */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(15,35,56,0.75);
      z-index: 1000;
      display: flex; align-items: flex-end;
      opacity: 0; pointer-events: none;
      transition: opacity 0.25s;
    }
    .modal-overlay.aberto { opacity: 1; pointer-events: all; }
    .modal-sheet {
      background: #F7F2EA;
      border-radius: 20px 20px 0 0;
      padding: 1.2rem 1.1rem 2.5rem;
      width: 100%;
      transform: translateY(100%);
      transition: transform 0.3s cubic-bezier(0.34,1.2,0.64,1);
      max-height: 92vh; overflow-y: auto;
    }
    .modal-overlay.aberto .modal-sheet { transform: translateY(0); }
    .modal-handle {
      width: 40px; height: 4px;
      background: #D4CDBF; border-radius: 99px;
      margin: 0 auto 1rem;
    }
    .modal-titulo {
      font-family: Georgia, serif;
      font-size: 1.15rem; color: #1A3C5E;
      margin-bottom: 1rem;
      border-bottom: 2px solid #C8973A;
      padding-bottom: 0.5rem;
    }
    .campo { margin-bottom: 0.85rem; }
    .campo label {
      display: block; font-size: 0.65rem;
      letter-spacing: 0.12em; text-transform: uppercase;
      color: #888; margin-bottom: 0.35rem;
      font-family: Georgia, serif;
    }
    .campo input, .campo textarea, .campo select {
      width: 100%; border: 1.5px solid #D4CDBF;
      border-radius: 8px; padding: 0.75rem 0.85rem;
      font-size: 1rem; font-family: Georgia, serif;
      color: #1A3C5E; background: white; outline: none;
      transition: border-color 0.2s; -webkit-appearance: none;
    }
    .campo input:focus, .campo textarea:focus { border-color: #C8973A; }
    .campo textarea { resize: none; height: 72px; }
    .modal-btns { display: flex; gap: 0.6rem; margin-top: 1rem; }
    .btn-cancelar {
      flex: 1; background: #E8E0D0; border: none;
      border-radius: 10px; padding: 0.85rem;
      font-family: Georgia, serif; font-size: 0.9rem;
      color: #888; cursor: pointer;
    }
    .btn-guardar {
      flex: 2; background: #1A3C5E; border: none;
      border-radius: 10px; padding: 0.85rem;
      font-family: Georgia, serif; font-size: 0.9rem;
      font-weight: bold; color: white; cursor: pointer;
    }
    .btn-guardar:active { background: #22344A; }

    /* Toast */
    .toast {
      position: fixed; bottom: 1.5rem; left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: #1A3C5E; color: white;
      padding: 0.6rem 1.2rem; border-radius: 99px;
      font-size: 0.82rem; z-index: 2000;
      transition: transform 0.3s ease;
      white-space: nowrap; border-left: 3px solid #C8973A;
      font-family: Georgia, serif;
    }
    .toast.visivel { transform: translateX(-50%) translateY(0); }

    /* Contador barra */
    .contador-wrap {
      background: #22344A; border-radius: 10px;
      padding: 0.9rem 1rem; margin-bottom: 1rem;
      display: flex; align-items: center; gap: 1rem;
    }
    .contador-num {
      font-size: 2rem; color: #C8973A;
      font-family: Georgia, serif; line-height: 1;
    }
    .contador-sub { font-size: 0.65rem; color: #aac4d8; letter-spacing: 0.1em; text-transform: uppercase; }
    .barra-track {
      flex: 1; background: rgba(255,255,255,0.1);
      border-radius: 99px; height: 6px; overflow: hidden;
    }
    .barra-fill {
      background: linear-gradient(90deg, #C8973A, #E8B96A);
      height: 100%; border-radius: 99px;
      transition: width 0.5s ease;
    }

    /* Cards sócios */
    .socio-card {
      background: white; border-radius: 10px;
      padding: 0.8rem 0.9rem; margin-bottom: 0.55rem;
      display: flex; align-items: center; gap: 0.8rem;
      border-left: 3px solid #C8973A;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }
    .socio-num {
      font-family: Georgia, serif; color: #C8973A;
      font-size: 1rem; min-width: 24px; text-align: center;
    }
    .socio-info { flex: 1; min-width: 0; }
    .socio-nome { font-size: 0.9rem; font-weight: bold; color: #1A3C5E; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .socio-det { font-size: 0.72rem; color: #888; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .btn-ic { background: none; border: none; cursor: pointer; padding: 0.3rem; font-size: 0.95rem; border-radius: 6px; }
    .btn-ic:active { background: #F0EBE0; }

    /* Btn adicionar */
    .btn-add-socio {
      display: flex; align-items: center; justify-content: center;
      gap: 0.5rem; background: #C8973A; color: #1A3C5E;
      border: none; border-radius: 10px; padding: 0.85rem;
      font-family: Georgia, serif; font-size: 0.9rem;
      font-weight: bold; cursor: pointer; width: 100%;
      margin-bottom: 1rem;
      box-shadow: 0 3px 12px rgba(200,151,58,0.3);
    }
    .btn-add-socio:active { opacity: 0.85; }

    /* Login sócios */
    .login-socio {
      background: #22344A; border-radius: 12px;
      padding: 1.5rem; max-width: 320px; margin: 0 auto;
      text-align: center;
    }
    .login-socio-titulo {
      color: #C8973A; font-size: 1rem; margin-bottom: 0.3rem;
    }
    .login-socio-sub { color: #aac4d8; font-size: 0.72rem; margin-bottom: 1.2rem; letter-spacing: 0.08em; }
    .login-socio input {
      width: 100%; background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.2); border-radius: 8px;
      padding: 0.75rem 1rem; color: white; font-size: 1rem;
      font-family: Georgia, serif; outline: none; margin-bottom: 0.8rem;
      letter-spacing: 0.2em; text-align: center;
    }
    .login-socio input:focus { border-color: #C8973A; }
    .btn-entrar {
      width: 100%; background: #C8973A; border: none;
      border-radius: 8px; padding: 0.75rem;
      font-family: Georgia, serif; font-weight: bold;
      font-size: 0.9rem; color: #1A3C5E; cursor: pointer;
    }
    .erro-pass { color: #ff8080; font-size: 0.78rem; margin-top: 0.5rem; }

    .btn-exportar-csv {
      background: none; border: 1px solid #C8973A;
      color: #C8973A; border-radius: 8px; padding: 0.3rem 0.7rem;
      font-size: 0.7rem; font-family: Georgia, serif; cursor: pointer;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <div class="toast" id="toast-global"></div>

  <script>
    // ── ARMAZENAMENTO TEMPORÁRIO (sem Firebase) ──
    // Os dados ficam na memória enquanto a página está aberta.
    // Quando ligarmos ao Firebase, ficam guardados para sempre.
    let _sociosDB = [];
    let _idCounter = 1;

    const db = {
      get: () => [..._sociosDB],
      add: (dados) => {
        const id = 's' + (_idCounter++);
        _sociosDB.push({ id, criadoEm: Date.now(), ...dados });
        return id;
      },
      update: (id, dados) => {
        const i = _sociosDB.findIndex(s => s.id === id);
        if (i !== -1) _sociosDB[i] = { ..._sociosDB[i], ...dados };
      },
      delete: (id) => {
        _sociosDB = _sociosDB.filter(s => s.id !== id);
      }
    };

    function mostrarToast(msg) {
      const t = document.getElementById('toast-global');
      t.textContent = msg;
      t.classList.add('visivel');
      setTimeout(() => t.classList.remove('visivel'), 2500);
    }
  </script>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // ────────────────────────────────────────────
    // COMPONENTE SÓCIOS FUNDADORES
    // ────────────────────────────────────────────
    function SociosModule() {
      const [socios, setSocios] = useState([]);
      const [modalAberto, setModalAberto] = useState(false);
      const [editandoId, setEditandoId] = useState(null);
      const [form, setForm] = useState({ nome:'', tel:'', email:'', profissao:'', notas:'' });
      const [carregando, setCarregando] = useState(false);

      useEffect(() => {
        carregarSocios();
      }, []);

      async function carregarSocios() {
        setCarregando(true);
        setSocios(db.get());
        setCarregando(false);
      }

      function abrirNovo() {
        setEditandoId(null);
        setForm({ nome:'', tel:'', email:'', profissao:'', notas:'' });
        setModalAberto(true);
      }

      function abrirEditar(s) {
        setEditandoId(s.id);
        setForm({ nome:s.nome||'', tel:s.tel||'', email:s.email||'', profissao:s.profissao||'', notas:s.notas||'' });
        setModalAberto(true);
      }

      async function guardar() {
        if (!form.nome.trim() && !form.tel.trim()) { mostrarToast('Preenche pelo menos o nome ou telemóvel'); return; }
        const dados = { nome:form.nome.trim(), tel:form.tel.trim(), email:form.email.trim(), profissao:form.profissao.trim(), notas:form.notas.trim() };
        if (editandoId) {
          db.update(editandoId, dados);
          mostrarToast('Sócio atualizado ✓');
        } else {
          db.add(dados);
          mostrarToast('Sócio adicionado ✓');
        }
        setModalAberto(false);
        carregarSocios();
      }

      async function apagar(id, nome) {
        if (!confirm(`Apagar "${nome}"?`)) return;
        db.delete(id);
        carregarSocios();
        mostrarToast('Removido');
      }

      function exportarHTML() {
        if (!socios.length) { mostrarToast('Sem dados para exportar'); return; }
        const data = new Date().toLocaleDateString('pt-PT');
        const linhas = socios.map((s,i) => `
          <tr>
            <td style="text-align:center;color:#C8973A;font-weight:bold;font-size:14pt">${i+1}</td>
            <td style="font-weight:bold;color:#1A3C5E">${s.nome||'—'}</td>
            <td>${s.profissao||'—'}</td>
            <td>${s.tel||'—'}</td>
            <td>${s.email||'—'}</td>
            <td style="font-style:italic;color:#666">${s.notas||''}</td>
          </tr>`).join('');
        const html = `<!DOCTYPE html><html lang="pt"><head><meta charset="UTF-8">
          <title>Sócios Fundadores</title>
          <style>
            @import url('https://fonts.googleapis.com/css2?family=EB+Garamond:wght@400;600&display=swap');
            body { font-family: 'EB Garamond', Georgia, serif; background:#F5F0E8; margin:0; padding:2cm; }
            .cabecalho { background:#1A3C5E; color:#F5F0E8; padding:20px 28px; border-bottom:4px solid #C8973A; margin-bottom:28px; }
            .titulo { font-size:20pt; font-weight:bold; margin-bottom:4px; }
            .sub { font-size:10pt; color:#aac4d8; letter-spacing:2px; text-transform:uppercase; }
            .meta { display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; }
            .meta-label { font-size:10pt; color:#888; letter-spacing:1px; text-transform:uppercase; }
            .contador { font-size:28pt; color:#C8973A; font-weight:bold; }
            .barra-wrap { background:#D4CDBF; border-radius:99px; height:8px; width:200px; overflow:hidden; }
            .barra-fill { background:#C8973A; height:100%; border-radius:99px; width:${Math.round((socios.length/50)*100)}%; }
            table { width:100%; border-collapse:collapse; font-size:11pt; }
            thead tr { background:#1A3C5E; color:#F5F0E8; }
            th { padding:9px 12px; text-align:left; font-weight:600; letter-spacing:0.5px; }
            tbody tr:nth-child(even) { background:#EDE8DE; }
            tbody tr:nth-child(odd) { background:#F5F0E8; }
            td { padding:9px 12px; border-bottom:1px solid #D4CDBF; vertical-align:top; }
            .rodape { margin-top:24px; font-size:9pt; color:#aaa; text-align:right; }
            @media print { body { padding:1cm; } .cabecalho { -webkit-print-color-adjust:exact; print-color-adjust:exact; } thead tr { -webkit-print-color-adjust:exact; print-color-adjust:exact; } }
          </style>
        </head><body>
          <div class="cabecalho">
            <div class="titulo">Projeto Cultural · Paços de Ferreira</div>
            <div class="sub">Lista de Sócios Fundadores</div>
          </div>
          <div class="meta">
            <div>
              <div class="meta-label">Total inscrito</div>
              <div class="contador">${socios.length} <span style="font-size:14pt;color:#888">/ 50</span></div>
              <div class="barra-wrap"><div class="barra-fill"></div></div>
            </div>
            <div style="text-align:right;color:#888;font-size:10pt">Gerado em ${data}</div>
          </div>
          <table>
            <thead><tr>
              <th style="width:36px">Nº</th>
              <th>Nome</th>
              <th>Profissão</th>
              <th>Telemóvel</th>
              <th>Email</th>
              <th>Notas</th>
            </tr></thead>
            <tbody>${linhas}</tbody>
          </table>
          <div class="rodape">Documento de trabalho interno · Projeto Cultural Paços de Ferreira</div>
        </body></html>`;
        const w = window.open('', '_blank');
        w.document.write(html);
        w.document.close();
        setTimeout(() => w.print(), 500);
      }

      // ── PAINEL PRINCIPAL ──
      const n = socios.length;
      const pct = Math.round((n/50)*100);
      return (
        <div>
          {/* Contador */}
          <div className="contador-wrap">
            <div>
              <div className="contador-num">{n}</div>
              <div className="contador-sub">de 50</div>
            </div>
            <div style={{ flex:1 }}>
              <div className="barra-track">
                <div className="barra-fill" style={{ width: pct+'%' }}></div>
              </div>
              <div style={{ fontSize:'0.62rem', color:'#aac4d8', textAlign:'right', marginTop:'0.2rem' }}>{pct}% do objetivo</div>
            </div>
          </div>

          {/* Botão adicionar */}
          <button className="btn-add-socio" onClick={abrirNovo}>
            ＋ Adicionar Sócio Fundador
          </button>

          {/* Header lista */}
          <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:'0.6rem' }}>
            <div style={{ fontSize:'0.65rem', letterSpacing:'0.1em', textTransform:'uppercase', color:'#888' }}>Inscritos</div>
            <button className="btn-exportar-csv" onClick={exportarHTML}>Imprimir / PDF ↗</button>
          </div>

          {/* Lista */}
          {carregando && <div style={{ textAlign:'center', padding:'1.5rem', color:'#888', fontSize:'0.85rem' }}>A carregar...</div>}

          {!carregando && n === 0 && (
            <div style={{ textAlign:'center', padding:'2.5rem 1rem', color:'#aaa' }}>
              <div style={{ fontSize:'2rem', marginBottom:'0.5rem' }}>🤝</div>
              <div style={{ fontSize:'0.82rem' }}>Ainda nenhum sócio inscrito</div>
            </div>
          )}

          {socios.map((s, i) => (
            <div key={s.id} className="socio-card">
              <div className="socio-num">{i+1}</div>
              <div className="socio-info">
                <div className="socio-nome">{s.nome || s.tel || '(sem nome)'}</div>
                <div className="socio-det">{[s.profissao, s.tel].filter(Boolean).join(' · ')}</div>
              </div>
              <button className="btn-ic" onClick={() => abrirEditar(s)} title="Editar">✏️</button>
              <button className="btn-ic" onClick={() => apagar(s.id, s.nome)} title="Apagar">🗑️</button>
            </div>
          ))}

          {/* Modal */}
          <div
            className={`modal-overlay ${modalAberto ? 'aberto' : ''}`}
            onClick={e => { if(e.target.classList.contains('modal-overlay')) setModalAberto(false); }}
          >
            <div className="modal-sheet">
              <div className="modal-handle"></div>
              <div className="modal-titulo">{editandoId ? 'Editar Sócio' : 'Novo Sócio Fundador'}</div>

              <div className="campo">
                <label>Nome completo</label>
                <input type="text" value={form.nome} onChange={e => setForm({...form, nome:e.target.value})} placeholder="Nome e apelido" autoFocus />
              </div>
              <div className="campo">
                <label>Telemóvel</label>
                <input type="tel" value={form.tel} onChange={e => setForm({...form, tel:e.target.value})} placeholder="912 345 678" />
              </div>
              <div className="campo">
                <label>Email</label>
                <input type="email" value={form.email} onChange={e => setForm({...form, email:e.target.value})} placeholder="nome@email.com" />
              </div>
              <div className="campo">
                <label>Profissão / Área</label>
                <input type="text" value={form.profissao} onChange={e => setForm({...form, profissao:e.target.value})} placeholder="Ex: Arquiteto, Médica, Empresário..." />
              </div>
              <div className="campo">
                <label>Notas</label>
                <textarea value={form.notas} onChange={e => setForm({...form, notas:e.target.value})} placeholder="Observações, referências, disponibilidade..."></textarea>
              </div>

              <div className="modal-btns">
                <button className="btn-cancelar" onClick={() => setModalAberto(false)}>Cancelar</button>
                <button className="btn-guardar" onClick={guardar}>Guardar</button>
              </div>
            </div>
          </div>
        </div>
      );
    }

    // ────────────────────────────────────────────
    // RESTO DO SITE (igual ao original)
    // ────────────────────────────────────────────

    function downloadWord(filename, htmlContent) {
      const header = `<html xmlns:o='urn:schemas-microsoft-com:office:office'
        xmlns:w='urn:schemas-microsoft-com:office:word'
        xmlns='http://www.w3.org/TR/REC-html40'>
        <head><meta charset='utf-8'><title></title>
        <style>
          body { font-family: Georgia, serif; font-size: 12pt; margin: 2cm; line-height: 1.6; }
          h1 { font-size: 18pt; color: #1A3C5E; border-bottom: 2pt solid #C8973A; padding-bottom: 6pt; }
          h2 { font-size: 14pt; color: #1A3C5E; margin-top: 18pt; }
          h3 { font-size: 12pt; color: #C8973A; margin-top: 12pt; }
          p { margin: 6pt 0; text-align: justify; }
          .field { background: #FFF8DC; border: 1pt dashed #C8973A; padding: 4pt 8pt; }
          table { width: 100%; border-collapse: collapse; margin: 12pt 0; }
          td, th { border: 1pt solid #ccc; padding: 6pt 8pt; }
          th { background: #1A3C5E; color: white; }
          .nota { font-style: italic; color: #888; font-size: 10pt; }
        </style></head><body>`;
      const footer = `</body></html>`;
      const blob = new Blob([header + htmlContent + footer], { type: "application/msword" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url; a.download = filename; a.click();
      URL.revokeObjectURL(url);
    }

    const wordDocs = [
      { label: "Estatutos", filename: "estatutos_associacao.doc", icon: "📄",
        html: `<h1>ESTATUTOS DA ASSOCIAÇÃO CULTURAL<br><span class="field">[NOME DA ASSOCIAÇÃO]</span></h1>
        <p class="nota">Documento modelo. Preencher os campos assinalados antes de submeter ao advogado.</p>
        <h2>CAPÍTULO I — Denominação, Sede e Duração</h2>
        <h3>Artigo 1.º — Denominação</h3><p>É constituída uma associação cultural sem fins lucrativos denominada <span class="field">[NOME DA ASSOCIAÇÃO]</span>.</p>
        <h3>Artigo 2.º — Sede</h3><p>A Associação tem sede em <span class="field">[MORADA COMPLETA]</span>.</p>
        <h3>Artigo 3.º — Duração</h3><p>A Associação constitui-se por tempo indeterminado.</p>
        <h2>CAPÍTULO II — Fins e Atividades</h2>
        <h3>Artigo 4.º — Fins</h3><p>Promover a cultura, a criação artística e o debate de ideias no município de Paços de Ferreira.</p>
        <h3>Artigo 5.º — Atividades</h3><p>Organizar espetáculos, concertos, exposições, conferências, festivais; editar publicações; estabelecer parcerias.</p>
        <h2>CAPÍTULO III — Associados</h2>
        <h3>Artigo 6.º — Categorias</h3><p>Sócios Fundadores, Sócios Efetivos, Sócios Familiares, Sócios Jovens e Sócios Honorários.</p>
        <h3>Artigo 7.º — Quotas</h3><p>O valor das quotas é fixado anualmente pela Assembleia Geral.</p>
        <h2>CAPÍTULO IV — Órgãos Sociais</h2>
        <h3>Artigo 8.º</h3><p>São órgãos: a Assembleia Geral; a Direção; e o Conselho Fiscal.</p>
        <h3>Artigo 9.º — Dissolução</h3><p>Só deliberada em AG com 3/4 dos associados e aprovação por 2/3.</p>
        <p><br><br>Paços de Ferreira, <span class="field">[DATA]</span></p>` },
      { label: "Ata de Fundação", filename: "ata_assembleia_fundadora.doc", icon: "📝",
        html: `<h1>ATA DA ASSEMBLEIA GERAL FUNDADORA</h1>
        <p>Aos <span class="field">[DIA]</span> dias do mês de <span class="field">[MÊS]</span> de 2026, pelas <span class="field">[HORA]</span> horas, reuniram em <span class="field">[LOCAL]</span>.</p>
        <h2>1. Mesa da Assembleia</h2><p>Presidente: <span class="field">[NOME]</span>. Secretário: <span class="field">[NOME]</span>.</p>

        { heading:"Tabela de Patrocínios", table:{ cols:["Nível","Valor Anual","Contrapartidas"], rows:[
          ["Fundador","5.000€+","Nome/logo permanente, convites VIP, relatório exclusivo"],
          ["Mecenas","2.000€–4.999€","Logo em cartazes, convites por evento, redes sociais"],
          ["Parceiro","500€–1.999€","Logo no programa, convites anuais, newsletter"],
          ["Apoiante","até 499€","Menção no programa e redes sociais"]
        ]}},
        { heading:"Quotas de Sócios", list:[
          ["Sócio Fundador","150€/ano — acesso prioritário e reconhecimento permanente"],
          ["Sócio Individual","50€/ano"],
          ["Sócio Família","80€/ano — até 4 pessoas"],
          ["Sócio Jovem (até 30 anos)","25€/ano"]
        ]}
      ]},
      { id:12, icon:"◈", title:"Programação", sections:[
        { heading:"Agenda Set → Dez 2026", agenda:[
          { mes:"Setembro", tipo:"🎪 FESTIVAL INAUGURAL — 2.º Fim de Semana (Sáb + Dom)", espaco:"Parque + Biblioteca + Museu + Casa em Pedra", nota:"Grande apresentação pública. Entrada livre. Todos os espaços em simultâneo." },
          { mes:"Outubro", tipo:"Teatro / Performance", espaco:"Auditório", nota:"Grupo local ou regional com percurso. Custo controlado." },
          { mes:"Outubro", tipo:"Tertúlia / Debate", espaco:"Casa em Pedra", nota:"Tema cultural ou cívico. Formato íntimo, convidados." },
          { mes:"Novembro", tipo:"Poesia / Diseurs", espaco:"Casa em Pedra", nota:"Formato serão. Luz baixa, vinho, 30–50 pessoas." },
          { mes:"Novembro", tipo:"Música Tradicional / Gaita de Foles", espaco:"Auditório", nota:"Articulação com grupos do Porto, Gaia ou Paços." },
          { mes:"Dezembro", tipo:"Concerto de Natal / Coral", espaco:"Auditório", nota:"Encerramento do ano. Abertura ao público geral." },
          { mes:"Dezembro", tipo:"Exposição de Encerramento", espaco:"Museu", nota:"Memória fotográfica do primeiro trimestre." }
        ]}
      ]},
      { id:13, icon:"⬢", title:"Calendário", sections:[
        { heading:"Fase 0 — De Abril ao Festival", roadmap:[
          { prazo:"Abril", tarefa:"Definir nome e identidade visual da associação", resp:"Fundador + equipa" },
          { prazo:"Abril", tarefa:"Recrutar os 50 sócios fundadores — convites pessoais", resp:"Fundador" },
          { prazo:"Maio", tarefa:"Redigir estatutos e registar no RNPC", resp:"Advogado + fundador" },
          { prazo:"Maio", tarefa:"Assembleia fundadora e eleição dos corpos sociais", resp:"Todos os 50 fundadores" },
          { prazo:"Maio/Jun", tarefa:"Obter NIF e abrir conta bancária", resp:"Direção" },
          { prazo:"Junho", tarefa:"Protocolo de espaços com a Câmara Municipal", resp:"Direção + Câmara" },
          { prazo:"Junho", tarefa:"Contratar seguro de responsabilidade civil", resp:"Tesoureiro/a" },
          { prazo:"Junho", tarefa:"Contactar mecenas privados — apresentar o projeto", resp:"Fundador + direção" },
          { prazo:"Julho", tarefa:"Submeter licenças do festival (câmara, ruído, PSP)", resp:"Coord. produção" },
          { prazo:"Julho", tarefa:"Contratar artistas e companhias para o festival", resp:"Coord. programação" },
          { prazo:"Agosto", tarefa:"Lançar site, redes sociais e primeira newsletter", resp:"Resp. comunicação" },
          { prazo:"Set. sem.1", tarefa:"Montagem de estruturas e ensaios técnicos", resp:"Produção" },
          { prazo:"Set. sem.2", tarefa:"🎪 FESTIVAL INAUGURAL — Sábado e Domingo", resp:"Toda a equipa" }
        ]}
      ]},

    ];

    const mesColors = { "Setembro":"#1A5E3C","Outubro":"#1A3C5E","Novembro":"#4A2060","Dezembro":"#6B2D1A" };

    function SectionTitle({ children }) {
      return <div style={{ fontSize:11, fontWeight:"bold", color:"#C8973A", letterSpacing:1.5, textTransform:"uppercase", marginBottom:9 }}>{children}</div>;
    }

    function App() {
      const [active, setActive] = useState(0);
      const [retOpen, setRetOpen] = useState(null);
      const [festOpen, setFestOpen] = useState(null);
      const [sociosAberto, setSociosAberto] = useState(false);
      const mod = modules[active];

      return (
        <div style={{ fontFamily:"Georgia, serif", background:"#F5F0E8", minHeight:"100vh", display:"flex", flexDirection:"column" }}>

          <div style={{ background:"#1A3C5E", padding:"18px 24px 12px", borderBottom:"4px solid #C8973A", position:"relative" }}>
            <div style={{ fontSize:10, letterSpacing:4, color:"#C8973A", textTransform:"uppercase", marginBottom:3 }}>Documento de Orientação Estratégica</div>
            <div style={{ fontSize:20, color:"#F5F0E8", fontWeight:"bold" }}>Projeto Cultural · Paços de Ferreira</div>
            <div style={{ fontSize:11, color:"#aac4d8", marginTop:2 }}>Festival Inaugural · 2.º Fim de Semana de Setembro 2026 · Entrada Livre</div>
            <button onClick={() => setSociosAberto(true)} style={{
              position:"absolute", top:14, right:16,
              background:"#C8973A", border:"none", borderRadius:8,
              padding:"7px 12px", cursor:"pointer",
              fontFamily:"Georgia, serif", fontSize:11, fontWeight:"bold",
              color:"#1A3C5E", display:"flex", alignItems:"center", gap:5,
              boxShadow:"0 2px 8px rgba(0,0,0,0.3)"
            }}>🤝 Sócios Fundadores</button>
          </div>

          {/* PAINEL SÓCIOS — overlay lateral */}
          {sociosAberto && (
            <div style={{ position:"fixed", inset:0, background:"rgba(15,35,56,0.6)", zIndex:500 }}
              onClick={() => setSociosAberto(false)}>
              <div style={{ position:"absolute", top:0, right:0, bottom:0, width:"min(420px, 100vw)",
                background:"#F7F2EA", boxShadow:"-4px 0 24px rgba(0,0,0,0.2)",
                display:"flex", flexDirection:"column", overflowY:"auto" }}
                onClick={e => e.stopPropagation()}>
                <div style={{ background:"#1A3C5E", padding:"14px 16px", display:"flex", justifyContent:"space-between", alignItems:"center", borderBottom:"3px solid #C8973A" }}>
                  <div style={{ color:"#C8973A", fontFamily:"Georgia, serif", fontSize:15, fontWeight:"bold" }}>🤝 Sócios Fundadores</div>
                  <button onClick={() => setSociosAberto(false)} style={{ background:"none", border:"none", color:"#aac4d8", fontSize:20, cursor:"pointer", lineHeight:1 }}>×</button>
                </div>
                <div style={{ padding:"1rem" }}>
                  <SociosModule />
                </div>
              </div>
            </div>
          )}

          <div style={{ display:"flex", overflowX:"auto", background:"#22344A", borderBottom:"2px solid #C8973A", padding:"0 4px" }}>
            {modules.map((m,i) => (
              <button key={i} onClick={() => setActive(i)} style={{
                background:"none",
                border:"none", cursor:"pointer", padding:"9px 10px",
                color: active===i ? "#C8973A" : "#aac4d8",
                fontSize:10, fontFamily:"Georgia, serif",
                borderBottom: active===i ? "3px solid #C8973A" : "3px solid transparent",
                whiteSpace:"nowrap"
              }}>{m.icon} {i+1}. {m.title}</button>
            ))}
          </div>

          <div style={{ flex:1, padding:"20px 24px", maxWidth:920, width:"100%", margin:"0 auto", boxSizing:"border-box" }}>
            <div style={{ fontSize:17, fontWeight:"bold", color:"#1A3C5E", borderBottom:"2px solid #C8973A", paddingBottom:6, marginBottom:18 }}>
              {mod.icon} {mod.title}
            </div>

            {/* PORTA-VOZ GERAL */}
            {mod.retorica && (
              <div>
                <p style={{ color:"#555", fontSize:13, lineHeight:1.7, marginBottom:18 }}>Guião de comunicação para diferentes contextos. Adaptar à voz e ao momento.</p>
                {retorica.map((r,i) => (
                  <div key={i} style={{ border:`1px solid ${r.cor}`, overflow:"hidden", marginBottom:8 }}>
                    <button onClick={() => setRetOpen(retOpen===i?null:i)} style={{ width:"100%", background:r.cor, border:"none", cursor:"pointer", padding:"10px 14px", display:"flex", justifyContent:"space-between", alignItems:"center" }}>
                      <span style={{ color:"#fff", fontFamily:"Georgia, serif", fontWeight:"bold", fontSize:12 }}>{r.titulo}</span>
                      <span style={{ color:"rgba(255,255,255,0.7)", fontSize:16 }}>{retOpen===i?"−":"+"}</span>
                    </button>
                    {retOpen===i && (
                      <div style={{ padding:"14px 16px", background:"#FAFAF5" }}>
                        <div style={{ fontSize:11, color:r.cor, fontWeight:"bold", marginBottom:8 }}>📍 {r.contexto}</div>
                        <blockquote style={{ margin:0, padding:"12px 16px", background:"#F0EDE6", borderLeft:`4px solid ${r.cor}`, fontSize:13, lineHeight:1.8, color:"#1A1A1A", fontStyle:"italic" }}>{r.texto}</blockquote>
                      </div>
                    )}
                  </div>
                ))}
              </div>
            )}

            {/* PORTA-VOZ DO FESTIVAL */}
            {mod.portavozFestival && (
              <div>
                <p style={{ color:"#555", fontSize:13, lineHeight:1.7, marginBottom:18 }}>O que dizer no festival. Para o presidente da direção.</p>
                {portavozFestival.map((r,i) => (
                  <div key={i} style={{ border:`1px solid ${r.cor}`, overflow:"hidden", marginBottom:8 }}>
                    <button onClick={() => setFestOpen(festOpen===i?null:i)} style={{ width:"100%", background:r.cor, border:"none", cursor:"pointer", padding:"10px 14px", display:"flex", justifyContent:"space-between", alignItems:"center" }}>
                      <span style={{ color:"#fff", fontFamily:"Georgia, serif", fontWeight:"bold", fontSize:12 }}>{r.titulo}</span>
                      <span style={{ color:"rgba(255,255,255,0.7)", fontSize:16 }}>{festOpen===i?"−":"+"}</span>
                    </button>
                    {festOpen===i && (
                      <div style={{ padding:"14px 16px", background:"#FAFAF5" }}>
                        <div style={{ fontSize:11, color:r.cor, fontWeight:"bold", marginBottom:8 }}>📍 {r.contexto}</div>
                        <blockquote style={{ margin:0, padding:"12px 16px", background:"#F0EDE6", borderLeft:`4px solid ${r.cor}`, fontSize:13, lineHeight:1.9, color:"#1A1A1A", fontStyle:"italic", whiteSpace:"pre-line" }}>{r.texto}</blockquote>
                      </div>
                    )}
                  </div>
                ))}
              </div>
            )}

            {/* PARQUE URBANO */}
            {mod.parqueUrbano && (
              <div>
                <SectionTitle>A Função do Parque Urbano — Argumento Cultural</SectionTitle>
                {parqueUrbano.funcao.map((f,i) => (
                  <div key={i} style={{ borderLeft:`4px solid ${f.cor}`, background:"#EDE8DE", padding:"10px 14px", marginBottom:8 }}>
                    <div style={{ fontSize:12, fontWeight:"bold", color:f.cor, marginBottom:5 }}>{f.titulo}</div>
                    <div style={{ fontSize:12, color:"#2C2C2C", lineHeight:1.7 }}>{f.texto}</div>
                  </div>
                ))}
                <div style={{ marginTop:18 }}>
                  <SectionTitle>Estratégia de Gestão e Ocupação</SectionTitle>
                  {parqueUrbano.gestao.map((g,i) => (
                    <div key={i} style={{ marginBottom:10, border:"1px solid #C8D8B0", borderLeft:"4px solid #3A7A1A", background:"#F0F5EA" }}>
                      <div style={{ background:"#3A7A1A", padding:"7px 12px" }}>
                        <span style={{ color:"#fff", fontWeight:"bold", fontSize:12 }}>{g.n}. {g.titulo}</span>
                      </div>
                      <div style={{ padding:"10px 12px" }}>
                        {g.docs.map((d,di) => (
                          <div key={di} style={{ display:"flex", gap:7, fontSize:12, color:"#2C2C2C", marginBottom:5 }}>
                            <span style={{ color:"#3A7A1A", flexShrink:0 }}>▸</span>
                            <span style={{ lineHeight:1.5 }}>{d}</span>
                          </div>
                        ))}
                      </div>
                    </div>
                  ))}
                </div>
                <div style={{ marginTop:18 }}>
                  <SectionTitle>Modelos de Referência Europeus</SectionTitle>
                  <table style={{ width:"100%", borderCollapse:"collapse", fontSize:12 }}>
                    <thead><tr>
                      <th style={{ background:"#1A3C5E", color:"#F5F0E8", padding:"8px 12px", textAlign:"left" }}>Modelo</th>
                      <th style={{ background:"#1A3C5E", color:"#F5F0E8", padding:"8px 12px", textAlign:"left" }}>Relevância</th>
                    </tr></thead>
                    <tbody>{parqueUrbano.modelos.map(([m,r],i) => (
                      <tr key={i} style={{ background: i%2===0?"#EDE8DE":"#F5F0E8" }}>
                        <td style={{ padding:"8px 12px", fontWeight:"bold", color:"#1A3C5E", borderBottom:"1px solid #D4CDBF" }}>{m}</td>
                        <td style={{ padding:"8px 12px", color:"#2C2C2C", borderBottom:"1px solid #D4CDBF" }}>{r}</td>
                      </tr>
                    ))}</tbody>
                  </table>
                </div>
              </div>
            )}

            {/* PRESIDENTE EM PÚBLICO */}
            {mod.presidentePublico && (
              <div>
                <SectionTitle>Frases Preparadas por Contexto</SectionTitle>
                {presidentePublico.frases.map((f,i) => (
                  <div key={i} style={{ display:"flex", background: i%2===0?"#EDE8DE":"#F5F0E8", borderLeft:"3px solid #C8973A", marginBottom:5 }}>
                    <div style={{ padding:"8px 12px", fontSize:11, fontWeight:"bold", color:"#1A3C5E", minWidth:180, flexShrink:0 }}>{f.contexto}</div>
                    <div style={{ padding:"8px 12px", fontSize:12, color:"#2C2C2C", fontStyle:"italic", lineHeight:1.6, flex:1 }}>{f.frase}</div>
                  </div>
                ))}
                <div style={{ marginTop:18 }}>
                  <SectionTitle>Perguntas Difíceis — Com Respostas Preparadas</SectionTitle>
                  {presidentePublico.perguntas.map((pq,i) => (
                    <div key={i} style={{ marginBottom:9, border:"1px solid #C8D8B0", overflow:"hidden" }}>
                      <div style={{ background:"#1A3C5E", padding:"8px 14px" }}>
                        <span style={{ color:"#F5F0E8", fontSize:12, fontWeight:"bold" }}>❓ {pq.p}</span>
                      </div>
                      <div style={{ padding:"10px 14px", background:"#F0F5EA", display:"flex", gap:8 }}>
                        <span style={{ color:"#3A7A1A", flexShrink:0 }}>💬</span>
                        <span style={{ fontSize:12, color:"#2C2C2C", lineHeight:1.6 }}>{pq.r}</span>
                      </div>
                    </div>
                  ))}
                </div>
                <div style={{ marginTop:18 }}>
                  <SectionTitle>Mnémónicas</SectionTitle>
                  {presidentePublico.mnemonicas.map((mn,i) => (
                    <div key={i} style={{ display:"grid", gridTemplateColumns:"100px 1fr 1fr", background: i%2===0?"#EDE8DE":"#F5F0E8", borderLeft:"4px solid #C8973A", marginBottom:5 }}>
                      <div style={{ padding:"10px 12px", fontWeight:"bold", fontSize:15, color:"#C8973A", display:"flex", alignItems:"center", justifyContent:"center" }}>{mn.sigla}</div>
                      <div style={{ padding:"10px 12px", fontSize:12, color:"#1A3C5E", fontWeight:"bold", display:"flex", alignItems:"center", borderLeft:"1px solid #D4CDBF" }}>{mn.expansao}</div>
                      <div style={{ padding:"10px 12px", fontSize:11, color:"#666", fontStyle:"italic", display:"flex", alignItems:"center", borderLeft:"1px solid #D4CDBF" }}>{mn.uso}</div>
                    </div>
                  ))}
                </div>
              </div>
            )}

            {/* SECTIONS NORMAIS */}
            {!mod.retorica && !mod.portavozFestival && !mod.parqueUrbano && !mod.presidentePublico && mod.sections && mod.sections.map((sec,si) => (
              <div key={si} style={{ marginBottom:22 }}>
                <SectionTitle>{sec.heading}</SectionTitle>
                {sec.content && <p style={{ color:"#2C2C2C", lineHeight:1.8, fontSize:13, margin:0, whiteSpace:"pre-line" }}>{sec.content}</p>}
                {sec.downloads && (
                  <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:8 }}>
                    {wordDocs.map((d,di) => (
                      <button key={di} onClick={() => downloadWord(d.filename, d.html)}
                        style={{ background:"#EDE8DE", border:"1px solid #C8973A", cursor:"pointer", padding:"9px 12px", display:"flex", alignItems:"center", gap:8, fontFamily:"Georgia, serif", textAlign:"left" }}>
                        <span style={{ fontSize:18 }}>{d.icon}</span>
                        <div>
                          <div style={{ fontSize:12, fontWeight:"bold", color:"#1A3C5E" }}>{d.label}</div>
                          <div style={{ fontSize:10, color:"#888" }}>Descarregar modelo Word</div>
                        </div>
                        <span style={{ marginLeft:"auto", color:"#C8973A" }}>⬇</span>
                      </button>
                    ))}
                  </div>
                )}
                {sec.list && (
                  <div style={{ display:"flex", flexDirection:"column", gap:5 }}>
                    {sec.list.map(([k,v],li) => (
                      <div key={li} style={{ display:"flex", background:"#EDE8DE", borderLeft:"3px solid #C8973A" }}>
                        <div style={{ padding:"7px 11px", fontWeight:"bold", fontSize:12, color:"#1A3C5E", minWidth:160, flexShrink:0 }}>{k}</div>
                        <div style={{ padding:"7px 11px", fontSize:12, color:"#333", flex:1, lineHeight:1.6 }}>{v}</div>
                      </div>
                    ))}
                  </div>
                )}
                {sec.steps && (
                  <ol style={{ margin:0, paddingLeft:20, display:"flex", flexDirection:"column", gap:6 }}>
                    {sec.steps.map((s,i) => <li key={i} style={{ fontSize:12, color:"#2C2C2C", lineHeight:1.6 }}>{s}</li>)}
                  </ol>
                )}
                {sec.table && (
                  <div style={{ overflowX:"auto" }}>
                    <table style={{ width:"100%", borderCollapse:"collapse", fontSize:12 }}>
                      <thead><tr>{sec.table.cols.map((c,ci) => (
                        <th key={ci} style={{ background:"#1A3C5E", color:"#F5F0E8", padding:"8px 11px", textAlign:"left" }}>{c}</th>
                      ))}</tr></thead>
                      <tbody>{sec.table.rows.map((row,ri) => (
                        <tr key={ri} style={{ background: ri%2===0?"#EDE8DE":"#F5F0E8" }}>
                          {row.map((cell,ci) => (
                            <td key={ci} style={{ padding:"7px 11px", color:"#2C2C2C", borderBottom:"1px solid #D4CDBF", fontWeight: ci===0?"bold":"normal" }}>{cell}</td>
                          ))}
                        </tr>
                      ))}</tbody>
                    </table>
                  </div>
                )}
                {sec.burocracia && sec.burocracia.map((b,bi) => (
                  <div key={bi} style={{ marginBottom:10, border:"1px solid #C8D8B0", borderLeft:"4px solid #3A7A1A", background:"#F0F5EA" }}>
                    <div style={{ background:"#3A7A1A", padding:"7px 12px", display:"flex", justifyContent:"space-between", alignItems:"center" }}>
                      <div style={{ color:"#fff", fontWeight:"bold", fontSize:12 }}>{b.passo} — {b.titulo}</div>
                      {b.prazo && <div style={{ color:"#C8F0A0", fontSize:10 }}>⏱ {b.prazo}</div>}
                    </div>
                    <div style={{ padding:"10px 12px" }}>
                      {b.entidade && <div style={{ fontSize:11, color:"#3A7A1A", fontWeight:"bold", marginBottom:6 }}>📍 {b.entidade}{b.custo ? ` · 💶 ${b.custo}` : ""}</div>}
                      <div style={{ display:"flex", flexDirection:"column", gap:4 }}>
                        {b.docs.map((d,di) => (
                          <div key={di} style={{ display:"flex", gap:7, fontSize:12, color:"#2C2C2C" }}>
                            <span style={{ color:"#3A7A1A", flexShrink:0 }}>▸</span>
                            <span style={{ lineHeight:1.5 }}>{d}</span>
                          </div>
                        ))}
                      </div>
                    </div>
                  </div>
                ))}
                {sec.agenda && (
                  <div style={{ display:"flex", flexDirection:"column", gap:5 }}>
                    {sec.agenda.map((ev,i) => (
                      <div key={i} style={{ display:"grid", gridTemplateColumns:"100px 1fr 140px",
                        background: i===0?"#FFFBEE":"#EDE8DE",
                        borderLeft:`4px solid ${mesColors[ev.mes]||"#C8973A"}`,
                        outline: i===0?"2px solid #C8973A":"none" }}>
                        <div style={{ padding:"8px 10px", background:mesColors[ev.mes]||"#C8973A", color:"#F5F0E8", fontSize:11, fontWeight:"bold", display:"flex", alignItems:"center" }}>{ev.mes}</div>
                        <div style={{ padding:"8px 11px" }}>
                          <div style={{ fontSize:12, fontWeight:"bold", color: i===0?"#7A5800":"#1A3C5E" }}>{ev.tipo}</div>
                          <div style={{ fontSize:11, color:"#666", marginTop:2 }}>{ev.nota}</div>
                        </div>
                        <div style={{ padding:"8px 10px", fontSize:10, color:"#888", display:"flex", alignItems:"center", fontStyle:"italic" }}>{ev.espaco}</div>
                      </div>
                    ))}
                  </div>
                )}
                {sec.festival && (
                  <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10 }}>
                    {sec.festival.map((f,fi) => (
                      <div key={fi} style={{ border:`2px solid ${f.cor}`, overflow:"hidden" }}>
                        <div style={{ background:f.cor, padding:"8px 12px", color:"#fff", fontWeight:"bold", fontSize:12 }}>{f.icon} {f.espaco}</div>
                        <div style={{ padding:"10px 12px", background:"#FAFAF5" }}>
                          {f.eventos.map((e,ei) => (
                            <div key={ei} style={{ display:"flex", gap:6, marginBottom:5, fontSize:12, color:"#2C2C2C" }}>
                              <span style={{ color:f.cor, flexShrink:0 }}>◆</span><span>{e}</span>
                            </div>
                          ))}
                        </div>
                      </div>
                    ))}
                  </div>
                )}
                {sec.roadmap && (
                  <div style={{ display:"flex", flexDirection:"column", gap:4 }}>
                    {sec.roadmap.map((item,i) => {
                      const isFest = item.prazo==="Set. sem.2";
                      return (
                        <div key={i} style={{ display:"grid", gridTemplateColumns:"90px 1fr 150px",
                          background: isFest?"#FFFBEE": i%2===0?"#EDE8DE":"#F5F0E8",
                          borderLeft: isFest?"4px solid #C8973A":"4px solid #1A3C5E",
                          outline: isFest?"2px solid #C8973A":"none" }}>
                          <div style={{ padding:"7px 10px", fontWeight:"bold", fontSize:11, color: isFest?"#7A5800":"#C8973A" }}>{item.prazo}</div>
                          <div style={{ padding:"7px 11px", fontSize:12, color:"#2C2C2C" }}>{item.tarefa}</div>
                          <div style={{ padding:"7px 10px", fontSize:10, color:"#888", fontStyle:"italic" }}>{item.resp}</div>
                        </div>
                      );
                    })}
                  </div>
                )}
              </div>
            ))}
          </div>

          <div style={{ background:"#1A3C5E", borderTop:"2px solid #C8973A", padding:"9px 24px", display:"flex", justifyContent:"space-between", alignItems:"center" }}>
            <div style={{ fontSize:10, color:"#aac4d8", letterSpacing:1 }}>Documento de trabalho interno · Março 2026</div>
            <div style={{ display:"flex", gap:8 }}>
              {active>0 && <button onClick={()=>setActive(active-1)} style={{ background:"none", border:"1px solid #C8973A", color:"#C8973A", padding:"4px 11px", fontSize:11, cursor:"pointer", fontFamily:"Georgia, serif" }}>← Anterior</button>}
              {active<modules.length-1 && <button onClick={()=>setActive(active+1)} style={{ background:"#C8973A", border:"none", color:"#1A3C5E", padding:"4px 11px", fontSize:11, cursor:"pointer", fontFamily:"Georgia, serif", fontWeight:"bold" }}>Seguinte →</button>}
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
